name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/gradle-build-action@v3

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle (if wrapper not committed)
      run: |
        if [ ! -f android/FarooqSmsBridge/gradlew ]; then
          sudo apt-get update
          sudo apt-get install -y gradle
        fi

    - name: Generate Gradle wrapper if missing
      run: |
        if [ ! -f android/FarooqSmsBridge/gradlew ]; then
          cd android/FarooqSmsBridge
          gradle wrapper --gradle-version 8.7.3
        else
          echo "gradlew already exists"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x android/FarooqSmsBridge/gradlew

    - name: Build Debug APK
      run: |
        cd android/FarooqSmsBridge
        ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: farooq-sms-bridge-debug-apk
        path: android/FarooqSmsBridge/app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: android/FarooqSmsBridge/app/build/outputs/apk/debug/app-debug.apk
        generate_release_notes: true